<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>日本都市クイズ 🚃</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{
  font-family:'Hiragino Kaku Gothic ProN','Hiragino Sans','BIZ UDPGothic','Meiryo',sans-serif;
  background:#0D1B3E;color:#FFF;min-height:100vh;overflow-x:hidden;
}
body::before{
  content:'';position:fixed;top:0;left:0;right:0;bottom:0;
  background-image:radial-gradient(circle,rgba(255,255,255,0.8) 1px,transparent 1px),
    radial-gradient(circle,rgba(255,215,0,0.5) 1px,transparent 1px);
  background-size:120px 120px,240px 240px;background-position:0 0,60px 60px;
  opacity:0.12;pointer-events:none;z-index:0;
}
.screen{display:none;min-height:100vh;position:relative;z-index:1;padding-bottom:20px;}
.screen.active{display:block;}

/* HEADER */
.hdr{
  background:linear-gradient(135deg,#1A0A5E,#0D1B3E);
  border-bottom:3px solid #FFD700;padding:12px 16px;
  display:flex;align-items:center;justify-content:space-between;
  position:sticky;top:0;z-index:100;
}
.hdr-title{font-size:1.1rem;font-weight:900;color:#FFD700;text-shadow:0 0 10px rgba(255,215,0,0.5);}
.btn-back{
  background:rgba(255,215,0,0.15);border:2px solid #FFD700;color:#FFD700;
  padding:5px 12px;border-radius:20px;font-size:0.8rem;font-weight:700;cursor:pointer;
}
.btn-back:active{opacity:0.7;}

/* HOME */
.home-hero{text-align:center;padding:20px 16px 10px;}
.home-hero h1{
  font-size:1.9rem;font-weight:900;color:#FFD700;
  text-shadow:3px 3px 0 #FF6B00,0 0 20px rgba(255,215,0,0.4);line-height:1.2;
}
.home-hero .sub{font-size:0.85rem;color:#88AAFF;margin-top:6px;}
.train-anim{font-size:2.2rem;text-align:center;padding:8px;animation:train 2.5s ease-in-out infinite;}
@keyframes train{0%,100%{transform:translateX(-8px);}50%{transform:translateX(8px);}}

.sec-title{padding:12px 16px 6px;font-size:0.95rem;font-weight:700;color:#FFD700;}

.genre-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;padding:0 14px 12px;}
.genre-card{
  background:linear-gradient(135deg,rgba(255,255,255,0.1),rgba(255,255,255,0.04));
  border:2px solid rgba(255,215,0,0.35);border-radius:16px;
  padding:18px 10px;text-align:center;cursor:pointer;transition:transform 0.15s;
  position:relative;overflow:hidden;
}
.genre-card::before{content:'';position:absolute;top:0;left:0;right:0;height:4px;background:var(--gc,#FFD700);}
.genre-card:active{transform:scale(0.95);}
.genre-card .gi{font-size:1.8rem;margin-bottom:6px;}
.genre-card .gn{font-size:0.75rem;font-weight:700;color:#FFF;line-height:1.3;}
.genre-card .gpbar{margin-top:8px;height:5px;background:rgba(255,255,255,0.2);border-radius:3px;overflow:hidden;}
.genre-card .gpfill{height:100%;background:var(--gc,#FFD700);border-radius:3px;transition:width 0.5s;}
.genre-card .gpt{font-size:0.65rem;color:#AAA;margin-top:3px;}

.action-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;padding:0 14px 14px;}
.action-card{
  background:linear-gradient(135deg,#1A0A5E,#2A1A6E);
  border:2px solid #FF6B00;border-radius:16px;padding:14px;text-align:center;cursor:pointer;transition:transform 0.15s;
}
.action-card:active{transform:scale(0.95);}
.action-card .ai{font-size:1.6rem;}
.action-card .an{font-size:0.78rem;font-weight:700;color:#FF6B00;margin-top:5px;}
.rbadge{display:inline-block;background:#FF4444;color:#FFF;font-size:0.65rem;font-weight:700;padding:2px 7px;border-radius:10px;margin-top:3px;}
.crate{font-size:0.68rem;color:#FF6B00;margin-top:3px;}

/* QUIZ */
.quiz-hdr{
  background:linear-gradient(135deg,#1A0A5E,#0D1B3E);
  border-bottom:3px solid #FFD700;padding:10px 16px;
}
.quiz-meta{display:flex;align-items:center;justify-content:space-between;margin-bottom:6px;}
.quiz-gname{font-size:0.82rem;font-weight:700;color:#FFD700;}
.quiz-cnt{font-size:0.82rem;color:#88AAFF;}
.quiz-pbar{height:7px;background:rgba(255,255,255,0.2);border-radius:4px;overflow:hidden;}
.quiz-pfill{height:100%;background:linear-gradient(90deg,#FFD700,#FF6B00);border-radius:4px;transition:width 0.4s;}
.quiz-score-line{font-size:0.78rem;color:#88AAFF;margin-top:5px;}

.q-card{
  margin:14px;background:rgba(255,255,255,0.07);
  border:2px solid rgba(255,215,0,0.28);border-radius:18px;
  padding:22px 18px;min-height:110px;display:flex;align-items:center;justify-content:center;
}
.q-text{font-size:1.05rem;font-weight:700;text-align:center;line-height:1.6;white-space:pre-wrap;}

.choices{display:grid;grid-template-columns:1fr 1fr;gap:9px;padding:0 14px;}
.cbtn{
  background:linear-gradient(135deg,rgba(255,255,255,0.1),rgba(255,255,255,0.04));
  border:2px solid rgba(255,255,255,0.28);border-radius:13px;
  padding:14px 10px;color:#FFF;font-size:0.88rem;font-weight:700;
  cursor:pointer;text-align:center;line-height:1.3;transition:transform 0.15s;
}
.cbtn:active{transform:scale(0.96);}
.cbtn.correct{background:linear-gradient(135deg,#1A5E1A,#2D8B2D);border-color:#4CAF50;animation:cpulse 0.5s ease;}
.cbtn.wrong{background:linear-gradient(135deg,#5E1A1A,#8B2D2D);border-color:#F44336;}
@keyframes cpulse{0%{transform:scale(1);}50%{transform:scale(1.05);}100%{transform:scale(1);}}
.clabel{color:#FFD700;font-size:0.7rem;display:block;margin-bottom:3px;}

.exp-card{margin:10px 14px;padding:12px 14px;border-radius:13px;font-size:0.82rem;line-height:1.5;display:none;}
.exp-card.correct{background:rgba(76,175,80,0.18);border:1px solid #4CAF50;color:#88FF88;}
.exp-card.wrong{background:rgba(244,67,54,0.18);border:1px solid #F44336;color:#FF9999;}

.next-btn{
  display:none;margin:10px 14px;padding:15px;
  background:linear-gradient(135deg,#FFD700,#FF6B00);border:none;border-radius:13px;
  color:#1A0A5E;font-size:0.95rem;font-weight:900;cursor:pointer;text-align:center;width:calc(100% - 28px);
}
.next-btn:active{opacity:0.85;}

/* RESULT */
.res-wrap{padding:20px 16px;text-align:center;}
.res-icon{font-size:4.5rem;margin:16px 0;}
.res-score{font-size:2.4rem;font-weight:900;color:#FFD700;text-shadow:2px 2px 0 #FF6B00;margin:8px 0;}
.res-msg{font-size:0.95rem;color:#88AAFF;margin-bottom:20px;}
.stars{display:flex;justify-content:center;gap:6px;font-size:1.8rem;margin:8px 0;}
.res-info{
  border-radius:10px;padding:10px 14px;margin:8px 0;font-size:0.82rem;
}
.res-info.ok{background:rgba(76,175,80,0.18);border:1px solid #4CAF50;color:#88FF88;}
.res-info.ng{background:rgba(244,67,54,0.18);border:1px solid #F44336;color:#FF9999;}
.res-btns{display:flex;flex-direction:column;gap:10px;margin-top:16px;}
.btn-p{padding:15px;background:linear-gradient(135deg,#FFD700,#FF6B00);border:none;border-radius:13px;color:#1A0A5E;font-size:0.95rem;font-weight:900;cursor:pointer;}
.btn-s{padding:13px;background:transparent;border:2px solid #FFD700;border-radius:13px;color:#FFD700;font-size:0.88rem;font-weight:700;cursor:pointer;}
.btn-p:active,.btn-s:active{opacity:0.8;}

/* REVIEW */
.rev-empty{text-align:center;padding:60px 20px;}
.rev-empty .ri{font-size:3.5rem;}
.rev-empty p{color:#88AAFF;margin-top:14px;font-size:0.95rem;line-height:1.6;}
.rev-start{
  display:block;margin:14px;padding:15px;
  background:linear-gradient(135deg,#FF4444,#FF6B00);border:none;border-radius:13px;
  color:#FFF;font-size:0.95rem;font-weight:900;cursor:pointer;text-align:center;
}
.rev-list{padding:0 14px 14px;}
.rev-item{
  background:rgba(255,255,255,0.07);border:1px solid rgba(255,68,68,0.35);
  border-radius:12px;padding:12px 14px;margin-bottom:8px;
}
.rev-genre{font-size:0.68rem;color:#FF9999;font-weight:700;margin-bottom:3px;}
.rev-q{font-size:0.85rem;font-weight:700;color:#FFF;}

/* COLLECTION */
.col-hero{padding:14px;text-align:center;}
.col-total{font-size:1.4rem;font-weight:900;color:#FFD700;}
.col-pbar-wrap{margin:8px auto;width:80%;height:10px;background:rgba(255,255,255,0.18);border-radius:5px;overflow:hidden;}
.col-pbar-fill{height:100%;background:linear-gradient(90deg,#FFD700,#FF6B00);border-radius:5px;}
.col-sub{font-size:0.82rem;color:#88AAFF;margin-top:3px;}
.col-genre{margin:0 14px 20px;}
.col-genre-hdr{display:flex;align-items:center;justify-content:space-between;padding:8px 0;border-bottom:2px solid rgba(255,215,0,0.28);margin-bottom:10px;}
.col-gname{font-size:0.9rem;font-weight:700;color:#FFD700;}
.col-grate{font-size:0.8rem;color:#88AAFF;}
.stamp-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:6px;}
.stamp{
  aspect-ratio:1;border-radius:10px;display:flex;flex-direction:column;
  align-items:center;justify-content:center;padding:3px;
  border:2px solid rgba(255,255,255,0.12);background:rgba(255,255,255,0.04);
  color:rgba(255,255,255,0.25);transition:all 0.3s;position:relative;overflow:hidden;
}
.stamp.got{background:linear-gradient(135deg,rgba(255,215,0,0.25),rgba(255,107,0,0.18));border-color:#FFD700;color:#FFD700;}
.stamp.got::after{content:'✓';position:absolute;top:1px;right:3px;font-size:0.55rem;color:#4CAF50;font-weight:900;}
.stamp-em{font-size:1.1rem;}
.stamp-nm{font-size:0.5rem;margin-top:2px;line-height:1.2;text-align:center;word-break:break-all;}

/* ACHIEVEMENT */
.ach-banner{
  position:fixed;top:0;left:0;right:0;
  background:linear-gradient(135deg,#FFD700,#FF6B00);color:#1A0A5E;
  padding:18px;text-align:center;font-size:1rem;font-weight:900;
  z-index:9999;transform:translateY(-100%);transition:transform 0.5s cubic-bezier(0.34,1.56,0.64,1);
}
.ach-banner.show{transform:translateY(0);}

@media(min-width:480px){
  .genre-grid{grid-template-columns:repeat(3,1fr);}
}
@media(min-width:600px){
  body{max-width:480px;margin:0 auto;box-shadow:0 0 40px rgba(0,0,0,0.5);}
  .ach-banner{max-width:480px;left:50%;transform:translateX(-50%) translateY(-100%);}
  .ach-banner.show{transform:translateX(-50%) translateY(0);}
}
</style>
</head>
<body>

<div id="ach" class="ach-banner"></div>

<!-- HOME -->
<div id="s-home" class="screen active">
  <div class="hdr">
    <div class="hdr-title">🚃 日本都市クイズ</div>
    <div id="home-stamp-total" style="font-size:0.75rem;color:#88AAFF;"></div>
  </div>
  <div class="home-hero">
    <div class="train-anim">🚃💨</div>
    <h1>全国制覇の旅へ！</h1>
    <div class="sub">5ジャンル・計50問に挑戦しよう</div>
  </div>
  <div class="sec-title">📋 ジャンルを選ぼう</div>
  <div class="genre-grid" id="genre-grid"></div>
  <div class="action-row">
    <div class="action-card" onclick="goReview()">
      <div class="ai">📚</div>
      <div class="an">復習BOX</div>
      <div class="rbadge" id="rbadge">0問</div>
    </div>
    <div class="action-card" onclick="goCollection()">
      <div class="ai">🗺️</div>
      <div class="an">コレクション</div>
      <div class="crate" id="col-rate">0/50 制覇</div>
    </div>
  </div>
</div>

<!-- QUIZ -->
<div id="s-quiz" class="screen">
  <div class="quiz-hdr">
    <div class="quiz-meta">
      <div class="quiz-gname" id="qgname"></div>
      <div class="quiz-cnt" id="qcnt"></div>
    </div>
    <div class="quiz-pbar"><div class="quiz-pfill" id="qpfill"></div></div>
    <div class="quiz-score-line">⭐ 正解: <span id="qscore">0</span></div>
  </div>
  <div class="q-card"><div class="q-text" id="qtext"></div></div>
  <div class="choices" id="choices"></div>
  <div class="exp-card" id="expcard"></div>
  <button class="next-btn" id="nextbtn" onclick="nextQ()">次の問題へ →</button>
</div>

<!-- RESULT -->
<div id="s-result" class="screen">
  <div class="hdr">
    <div class="hdr-title">🏆 結果発表</div>
    <button class="btn-back" onclick="goHome()">ホームへ</button>
  </div>
  <div class="res-wrap" id="res-wrap"></div>
</div>

<!-- REVIEW -->
<div id="s-review" class="screen">
  <div class="hdr">
    <div class="hdr-title">📚 復習BOX</div>
    <button class="btn-back" onclick="goHome()">ホームへ</button>
  </div>
  <div id="rev-content"></div>
</div>

<!-- COLLECTION -->
<div id="s-col" class="screen">
  <div class="hdr">
    <div class="hdr-title">🗺️ コレクション</div>
    <button class="btn-back" onclick="goHome()">ホームへ</button>
  </div>
  <div id="col-content"></div>
</div>

<script>
// ===== DATA =====
const GENRES = {
  seireishitei:{
    name:'政令指定都市クイズ',icon:'🏙️',color:'#4A90E2',
    questions:[
      {q:'政令指定都市は全国に何市ある？（2024年時点）',cs:['18市','19市','20市','21市'],a:2,exp:'2012年に熊本市が加わり現在は全国に20の政令指定都市があります。',city:'全国20政令市'},
      {q:'日本で最も人口の多い政令指定都市は？',cs:['大阪市','横浜市','名古屋市','札幌市'],a:1,exp:'横浜市の人口は約374万人で政令指定都市・全市区町村（23区除く）で最多です。',city:'横浜市'},
      {q:'北海道唯一の政令指定都市は？',cs:['旭川市','函館市','帯広市','札幌市'],a:3,exp:'札幌市は1972年に政令指定都市となった北海道唯一の政令市です。',city:'札幌市'},
      {q:'最も新しく政令指定都市になったのはどこ？',cs:['岡山市','相模原市','熊本市','新潟市'],a:2,exp:'熊本市は2012年4月に政令指定都市となり、現在のところ最新の政令市です。',city:'熊本市'},
      {q:'面積が最も大きい政令指定都市は？',cs:['浜松市','静岡市','横浜市','札幌市'],a:0,exp:'浜松市の面積は約1558㎢で政令指定都市の中で最も広い面積を誇ります。',city:'浜松市'},
      {q:'政令指定都市の中で県庁所在地でないのはどれ？',cs:['仙台市','堺市','広島市','福岡市'],a:1,exp:'堺市は大阪府の政令市ですが、大阪府の府庁所在地は大阪市です。',city:'堺市'},
      {q:'相模原市がある都道府県は？',cs:['東京都','神奈川県','埼玉県','千葉県'],a:1,exp:'相模原市は神奈川県北部にある政令指定都市。2010年に政令市になりました。',city:'相模原市'},
      {q:'さいたま市が政令指定都市になったのはいつ？',cs:['2001年','2003年','2005年','2007年'],a:1,exp:'さいたま市は2003年4月に政令指定都市となりました。浦和・大宮・与野の合併により誕生しました。',city:'さいたま市'},
      {q:'新潟市が政令指定都市になったのはいつ？',cs:['2003年','2005年','2007年','2009年'],a:2,exp:'新潟市は2007年4月に政令指定都市となり、新潟県唯一の政令市です。',city:'新潟市'},
      {q:'岡山市が政令指定都市になったのはいつ？',cs:['2007年','2008年','2009年','2010年'],a:2,exp:'岡山市は2009年4月に政令指定都市となりました。中国地方では広島市に次ぐ2例目です。',city:'岡山市'}
    ]
  },
  kencho:{
    name:'県庁所在地クイズ',icon:'🏛️',color:'#9B59B6',
    questions:[
      {q:'岩手県の県庁所在地はどこ？',cs:['花巻市','一関市','盛岡市','北上市'],a:2,exp:'盛岡市は岩手県の県庁所在地。冬の「盛岡冷麺」や石割桜が有名です。',city:'盛岡市'},
      {q:'群馬県の県庁所在地はどこ？',cs:['高崎市','伊勢崎市','太田市','前橋市'],a:3,exp:'前橋市は群馬県の県庁所在地。隣の高崎市の方が人口は多く、よく間違えられます。',city:'前橋市'},
      {q:'栃木県の県庁所在地はどこ？',cs:['日光市','足利市','栃木市','宇都宮市'],a:3,exp:'宇都宮市は栃木県の県庁所在地。餃子の街として全国的に有名です。',city:'宇都宮市'},
      {q:'山梨県の県庁所在地はどこ？',cs:['山梨市','甲府市','富士吉田市','大月市'],a:1,exp:'甲府市は山梨県の県庁所在地。武田信玄ゆかりの城下町として栄えました。',city:'甲府市'},
      {q:'石川県の県庁所在地はどこ？',cs:['七尾市','輪島市','白山市','金沢市'],a:3,exp:'金沢市は石川県の県庁所在地。「小京都」とも呼ばれ、兼六園が有名です。',city:'金沢市'},
      {q:'島根県の県庁所在地はどこ？',cs:['出雲市','浜田市','益田市','松江市'],a:3,exp:'松江市は島根県の県庁所在地。宍道湖と松江城が有名な城下町です。',city:'松江市'},
      {q:'愛媛県の県庁所在地はどこ？',cs:['今治市','新居浜市','松山市','宇和島市'],a:2,exp:'松山市は愛媛県の県庁所在地。道後温泉と松山城、坊っちゃんで有名です。',city:'松山市'},
      {q:'高知県の県庁所在地はどこ？',cs:['南国市','四万十市','土佐市','高知市'],a:3,exp:'高知市は高知県の県庁所在地。坂本龍馬の出身地として知られています。',city:'高知市'},
      {q:'沖縄県の県庁所在地はどこ？',cs:['沖縄市','宜野湾市','那覇市','浦添市'],a:2,exp:'那覇市は沖縄県の県庁所在地。首里城と国際通りが有名な観光都市です。',city:'那覇市'},
      {q:'宮城県の県庁所在地はどこ？',cs:['石巻市','気仙沼市','仙台市','塩竈市'],a:2,exp:'仙台市は宮城県の県庁所在地。「杜の都」とも呼ばれ、牛タンが名物です。',city:'仙台市'}
    ]
  },
  jinko:{
    name:'人口ランキングクイズ',icon:'👥',color:'#27AE60',
    questions:[
      {q:'日本で人口が最も多い「市」はどこ？',cs:['大阪市','名古屋市','横浜市','川崎市'],a:2,exp:'横浜市の人口は約374万人。東京23区を除く市区町村の中で断トツの1位です。',city:'横浜市'},
      {q:'市の人口ランキング2位はどこ？',cs:['名古屋市','大阪市','札幌市','福岡市'],a:1,exp:'大阪市の人口は約275万人で、関西最大の都市として全国2位です。',city:'大阪市'},
      {q:'市の人口ランキング3位はどこ？',cs:['福岡市','名古屋市','神戸市','京都市'],a:1,exp:'名古屋市の人口は約232万人で、東海地方最大・全国3位の都市です。',city:'名古屋市'},

// ===== STATE =====
const SK = 'nihon_city_quiz_v2';
let S = {stamps:{}, reviewBox:[], mode:'quiz', genreId:null, qs:[], qi:0, score:0, answered:false};

function loadS(){
  try{
    const d = JSON.parse(localStorage.getItem(SK)||'{}');
    S.stamps = d.stamps||{};
    S.reviewBox = d.reviewBox||[];
    Object.keys(S.stamps).forEach(k=>{S.stamps[k]=new Set(S.stamps[k]||[]);});
  }catch(e){}
}
function saveS(){
  try{
    const d = {stamps:{}, reviewBox:S.reviewBox};
    Object.keys(S.stamps).forEach(k=>{d.stamps[k]=[...S.stamps[k]];});
    localStorage.setItem(SK, JSON.stringify(d));
  }catch(e){}
}

// ===== NAV =====
function show(id){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  window.scrollTo(0,0);
}
function goHome(){buildHome();show('s-home');}
function goReview(){buildReview();show('s-review');}
function goCollection(){buildCollection();show('s-col');}

// ===== HOME =====
function buildHome(){
  const grid = document.getElementById('genre-grid');
  grid.innerHTML='';
  let total=0;
  Object.entries(GENRES).forEach(([id,g])=>{
    const got = S.stamps[id]?S.stamps[id].size:0;
    const tot = g.questions.length;
    total += got;
    const pct = Math.round(got/tot*100);
    const el = document.createElement('div');
    el.className='genre-card';
    el.style.setProperty('--gc', g.color);
    el.onclick=()=>startQuiz(id);
    el.innerHTML=`<div class="gi">${g.icon}</div><div class="gn">${g.name}</div>
      <div class="gpbar"><div class="gpfill" style="width:${pct}%"></div></div>
      <div class="gpt">${got}/${tot} 制覇</div>`;
    grid.appendChild(el);
  });
  const allQ = Object.values(GENRES).reduce((a,g)=>a+g.questions.length,0);
  document.getElementById('home-stamp-total').textContent = `⭐${total}/${allQ}`;
  document.getElementById('rbadge').textContent = S.reviewBox.length+'問';
  document.getElementById('col-rate').textContent = `${total}/${allQ} 制覇`;
}

// ===== QUIZ =====
function shuffle(arr){
  const a=[...arr];
  for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}
  return a;
}

function startQuiz(id){
  S.mode='quiz'; S.genreId=id;
  S.qs=shuffle(GENRES[id].questions);
  S.qi=0; S.score=0; S.answered=false;
  document.getElementById('qgname').textContent = GENRES[id].icon+' '+GENRES[id].name;
  show('s-quiz');
  renderQ();
}

function startReviewQuiz(){
  if(!S.reviewBox.length) return;
  S.mode='review'; S.genreId='review';
  S.qs=shuffle(S.reviewBox.map(it=>{
    const q=GENRES[it.gid].questions[it.qi];
    return {...q, _gid:it.gid, _qi:it.qi};
  }));
  S.qi=0; S.score=0; S.answered=false;
  document.getElementById('qgname').textContent='📚 復習クイズ';
  show('s-quiz');
  renderQ();
}

function renderQ(){
  const q=S.qs[S.qi], tot=S.qs.length, cur=S.qi+1;
  document.getElementById('qcnt').textContent=`${cur} / ${tot}`;
  document.getElementById('qpfill').style.width=((cur-1)/tot*100)+'%';
  document.getElementById('qscore').textContent=S.score;
  document.getElementById('qtext').textContent=q.q;

  const choices=document.getElementById('choices');
  choices.innerHTML='';
  ['A','B','C','D'].forEach((lbl,i)=>{
    const b=document.createElement('button');
    b.className='cbtn';
    b.innerHTML=`<span class="clabel">${lbl}.</span>${q.cs[i]}`;
    b.onclick=()=>pick(i);
    choices.appendChild(b);
  });
  document.getElementById('expcard').style.display='none';
  document.getElementById('expcard').className='exp-card';
  const nb=document.getElementById('nextbtn');
  nb.style.display='none';
  nb.textContent=S.qi+1<S.qs.length?'次の問題へ →':'結果を見る';
  S.answered=false;
}

function pick(chosen){
  if(S.answered) return;
  S.answered=true;
  const q=S.qs[S.qi];
  const ok = chosen===q.a;

  document.querySelectorAll('.cbtn').forEach((b,i)=>{
    b.onclick=null;
    if(i===q.a) b.classList.add('correct');
    else if(i===chosen&&!ok) b.classList.add('wrong');
  });

  const exp=document.getElementById('expcard');
  exp.style.display='block';
  if(ok){
    exp.className='exp-card correct';
    exp.innerHTML='✅ 正解！<br>'+q.exp;
    S.score++;
    document.getElementById('qscore').textContent=S.score;
    const gid = S.mode==='review'?q._gid:S.genreId;
    if(!S.stamps[gid]) S.stamps[gid]=new Set();
    S.stamps[gid].add(q.city);
    if(S.mode==='review'){
      S.reviewBox=S.reviewBox.filter(it=>!(it.gid===q._gid&&it.qi===q._qi));
    }
    saveS();
  } else {
    exp.className='exp-card wrong';
    exp.innerHTML='❌ 不正解！ 正解：'+q.cs[q.a]+'<br>'+q.exp;
    if(S.mode==='quiz'){
      const origQi = GENRES[S.genreId].questions.findIndex(gq=>gq.q===q.q);
      const dup = S.reviewBox.some(it=>it.gid===S.genreId&&it.qi===origQi);
      if(!dup&&origQi>=0){
        S.reviewBox.push({gid:S.genreId, qi:origQi});
        saveS();
      }
    }
  }
  const nb=document.getElementById('nextbtn');
  nb.style.display='block';
  nb.textContent=S.qi+1<S.qs.length?'次の問題へ →':'結果を見る';
}

function nextQ(){
  S.qi++;
  if(S.qi>=S.qs.length) showResult();
  else renderQ();
}

// ===== RESULT =====
function showResult(){
  const tot=S.qs.length, sc=S.score, pct=Math.round(sc/tot*100);
  let icon,msg;
  if(pct===100){icon='🏆';msg='完璧！全問正解！全国制覇は目前だ！';}
  else if(pct>=80){icon='🥇';msg='すばらしい！もう少しで制覇だ！';}
  else if(pct>=60){icon='🥈';msg='なかなかの調子！復習で満点を狙おう！';}
  else if(pct>=40){icon='🥉';msg='まだまだ伸びしろあり！復習BOXで練習しよう！';}
  else{icon='😓';msg='ドンマイ！復習BOXで特訓だ！';}

  const starN=Math.max(1,Math.ceil(sc/tot*5));
  const stars='⭐'.repeat(starN)+'☆'.repeat(5-starN);
  const rc=S.reviewBox.length;

  document.getElementById('res-wrap').innerHTML=`
    <div class="res-icon">${icon}</div>
    <div class="stars">${stars}</div>
    <div class="res-score">${sc} / ${tot}</div>
    <div class="res-msg">${msg}</div>
    <div class="res-info ${rc>0?'ng':'ok'}">${rc>0?'📚 復習BOXに '+rc+'問 入っています':'✨ 復習BOXは空です！すばらしい！'}</div>
    <div class="res-btns">
      ${S.mode==='quiz'?`<button class="btn-p" onclick="startQuiz('${S.genreId}')">もう一度挑戦</button>`:''}
      ${rc>0?`<button class="btn-s" onclick="startReviewQuiz()">📚 復習クイズに挑戦</button>`:''}
      <button class="btn-s" onclick="goHome()">ジャンル選択へ戻る</button>
    </div>`;

  show('s-result');
  checkAch();
}

// ===== REVIEW =====
function buildReview(){
  const el=document.getElementById('rev-content');
  if(!S.reviewBox.length){
    el.innerHTML=`<div class="rev-empty"><div class="ri">🎉</div><p>復習BOXは空です！<br>すべての問題をクリアしました！</p></div>`;
    return;
  }
  let h=`<button class="rev-start" onclick="startReviewQuiz()">🚀 復習クイズを開始（${S.reviewBox.length}問）</button><div class="rev-list">`;
  S.reviewBox.forEach(it=>{
    const g=GENRES[it.gid], q=g.questions[it.qi];
    const prev=q.q.replace(/\n/g,' ').substring(0,28)+(q.q.length>28?'…':'');
    h+=`<div class="rev-item"><div class="rev-genre">${g.icon} ${g.name}</div><div class="rev-q">${prev}</div></div>`;
  });
  h+='</div>';
  el.innerHTML=h;
}

// ===== COLLECTION =====
function buildCollection(){
  let totalGot=0, totalAll=0;
  Object.entries(GENRES).forEach(([id,g])=>{totalGot+=(S.stamps[id]?S.stamps[id].size:0);totalAll+=g.questions.length;});
  const pct=Math.round(totalGot/totalAll*100);

  let h=`<div class="col-hero">
    <div class="col-total">🗺️ ${totalGot} / ${totalAll} 制覇</div>
    <div class="col-pbar-wrap"><div class="col-pbar-fill" style="width:${pct}%"></div></div>
    <div class="col-sub">全国制覇率 ${pct}%</div>
  </div>`;

  Object.entries(GENRES).forEach(([id,g])=>{
    const got=S.stamps[id]||new Set();
    const gc=got.size, gt=g.questions.length, gp=Math.round(gc/gt*100);
    h+=`<div class="col-genre">
      <div class="col-genre-hdr">
        <div class="col-gname">${g.icon} ${g.name}</div>
        <div class="col-grate">${gc}/${gt}（${gp}%）</div>
      </div>
      <div class="stamp-grid">`;
    g.questions.forEach(q=>{
      const ok=got.has(q.city);
      h+=`<div class="stamp ${ok?'got':''}">
        <div class="stamp-em">${ok?g.icon:'❓'}</div>
        <div class="stamp-nm">${ok?q.city:'？？？'}</div>
      </div>`;
    });
    h+='</div></div>';
  });

  document.getElementById('col-content').innerHTML=h;
}

// ===== ACHIEVEMENTS =====
function checkAch(){
  let total=0,allQ=0;
  Object.entries(GENRES).forEach(([id,g])=>{total+=(S.stamps[id]?S.stamps[id].size:0);allQ+=g.questions.length;});
  if(total===allQ){showAch('🏆 全国完全制覇！全50問クリアおめでとう！');return;}
  Object.entries(GENRES).forEach(([id,g])=>{
    const s=S.stamps[id];
    if(s&&s.size===g.questions.length){
      const k='ach_'+id;
      if(!sessionStorage.getItem(k)){sessionStorage.setItem(k,'1');showAch(`${g.icon}「${g.name}」完全制覇！`);}
    }
  });
  if(!S.reviewBox.length&&total>0){
    const k='ach_rev0';
    if(!sessionStorage.getItem(k)){sessionStorage.setItem(k,'1');showAch('📚 復習BOXを完全クリア！');}
  }
}
function showAch(msg){
  const b=document.getElementById('ach');
  b.textContent='🎊 '+msg+' 🎊';
  b.classList.add('show');
  setTimeout(()=>b.classList.remove('show'),4000);
}

// ===== INIT =====
loadS();
buildHome();
</script>
